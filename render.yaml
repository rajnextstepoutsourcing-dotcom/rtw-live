services:
  - type: web
    name: rtw-live
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt && playwright install --with-deps chromium
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL_FAST
        value: gemini-2.0-flash-001
      - key: GEMINI_MODEL_STRONG
        value: gemini-2.5-pro
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: NEXTSTEP_INTERNAL_TOKEN
        sync: false
      - key: BACKEND_VALIDATE_URL
        value: https://nextstep-backend-e75l.onrender.com/api/validate-session
      - key: APP_DASHBOARD_URL
        value: https://nextstep-backend-e75l.onrender.com/dashboard
      - key: APP_LOGIN_URL
        value: https://nextstep-backend-e75l.onrender.com/login
      - key: MAX_CONCURRENT_TASKS
        value: "1"
      - key: WORKER_POLL_INTERVAL
        value: "2"
      - key: TASK_TIMEOUT_SECONDS
        value: "600"
      - key: MAX_TASK_RETRIES
        value: "1"
      - key: ZIP_ON_COMPLETE
        value: "true"
